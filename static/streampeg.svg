<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 370 75">
  <defs>
    <clipPath id="bounds"><rect width="370" height="75" rx="5"/></clipPath>
    <clipPath id="left-clip"><rect x="0" y="0" width="202" height="75"/></clipPath>
    <clipPath id="right-clip"><rect x="202" y="0" width="165" height="75"/></clipPath>
  </defs>
  <g clip-path="url(#bounds)">
    <!-- Full white background -->
    <rect width="370" height="75" fill="#ffffff"/>
    <!-- Black right side -->
    <rect x="202" y="0" width="165" height="75" fill="#000000"/>
  </g>
  <!-- White border around entire logo -->
  <rect x="1" y="1" width="368" height="73" rx="4" fill="none" stroke="#ffffff" stroke-width="2"/>
  <!-- Text on white part (black text) -->
  <text clip-path="url(#left-clip)" x="185" y="53" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="54" font-weight="normal" letter-spacing="3">
    <tspan fill="#000000">strea</tspan><tspan fill="#888888">m</tspan><tspan fill="#000000">peg</tspan>
  </text>
  <!-- Text on black part (white text) -->
  <text clip-path="url(#right-clip)" x="185" y="53" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="54" font-weight="normal" letter-spacing="3">
    <tspan fill="#ffffff">strea</tspan><tspan fill="#888888">m</tspan><tspan fill="#ffffff">peg</tspan>
  </text>
</svg>
