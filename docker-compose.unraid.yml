## Unraid-spezifische Konfiguration
## Nutzung: docker compose -f docker-compose.unraid.yml up -d
services:
  streampeg:
    build: .
    container_name: streampeg
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      - SR_UI_SECRET=${SR_UI_SECRET:-change-me-in-production}
      - SR_LIBRARY_PATH=/library
    volumes:
      - /mnt/user/appdata/streampeg:/data           # DB auf Unraid appdata
      - /tmp/streampeg-recording:/recording          # temp Aufnahmen
      - /mnt/user/streams:/library                   # Ziel-Share fuer Songs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
