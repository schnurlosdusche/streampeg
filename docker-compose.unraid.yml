## Unraid-spezifische Konfiguration
## Nutzung: docker compose -f docker-compose.unraid.yml up -d
services:
  streampeg:
    build: .
    container_name: streampeg
    restart: unless-stopped
    network_mode: host
    environment:
      - SR_UI_SECRET=${SR_UI_SECRET:-streampeg-secret}
      - SR_LIBRARY_PATH=/library
      - SR_UI_PASSWORD=${SR_UI_PASSWORD:-streaming}
    volumes:
      - /mnt/user/appdata/streampeg:/data
      - /tmp/streampeg-recording:/recording
      - /mnt/user/streams:/library
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
