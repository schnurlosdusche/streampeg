services:
  streampeg:
    build: .
    container_name: streampeg
    restart: unless-stopped
    # Host network required for LMS/Sonos/SlimProto device discovery
    # (UDP broadcast, mDNS, SlimProto on port 3483)
    network_mode: host
    environment:
      - SR_UI_SECRET=${SR_UI_SECRET:-streampeg-secret}
      - SR_LIBRARY_PATH=/library
      - SR_UI_PASSWORD=${SR_UI_PASSWORD:-streaming}
    volumes:
      - ./data:/data                # DB + persistent state
      - ./recording:/recording      # Temporary recordings (synced to library)
      - ./library:/library          # Music library / NAS mount
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
