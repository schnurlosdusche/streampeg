services:
  streampeg:
    build: .
    container_name: streampeg
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      - SR_UI_SECRET=${SR_UI_SECRET:-change-me-in-production}
      - SR_LIBRARY_PATH=/library
    volumes:
      - ./data:/data                # DB + persistent state
      - ./library:/library          # Music library (local storage)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
